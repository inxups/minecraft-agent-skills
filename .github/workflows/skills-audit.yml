name: Skills Audit

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Validate mirror sync
        run: npm run check:sync

      - name: Validate plugin bundle
        run: npm run check:plugin-bundle

      - name: Run skill audit
        run: npm run audit:skills

      - name: Validate documentation snippets
        run: npm run test:docs

      - name: Run validator fixture tests
        run: npm run test:validators

      - name: Run repo policy fixtures
        run: npm run test:repo-policy

      - name: Validate workflow action pinning
        run: npm run check:workflow-pins

      - name: Validate GitHub community files
        run: npm run check:community

      - name: Run markdown lint
        run: npm run lint:md

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
